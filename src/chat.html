<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wizard Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0c0618;
      --bg-panel: rgba(18, 10, 38, 0.95);
      --bg-surface: rgba(30, 18, 60, 0.9);
      --bg-input: rgba(40, 25, 75, 0.6);
      --purple-primary: #a855f7;
      --purple-dim: #7c3aed;
      --purple-glow: rgba(168, 85, 247, 0.3);
      --purple-subtle: rgba(168, 85, 247, 0.08);
      --text-primary: #ede9ff;
      --text-secondary: #b8a8d9;
      --text-dim: #7a6b99;
      --accent-cyan: #38bdf8;
      --accent-gold: #fbbf24;
      --border-color: rgba(168, 85, 247, 0.2);
      --shadow-glow: 0 0 20px rgba(168, 85, 247, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: transparent;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      height: 100%;
      overflow: hidden;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        var(--shadow-glow),
        0 24px 48px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
    }

    /* ── Title Bar ── */
    #titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(30, 15, 60, 0.95), rgba(18, 10, 38, 0.98));
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    #titlebar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #titlebar-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--purple-primary), var(--purple-dim));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 10px var(--purple-glow);
    }

    #titlebar-title {
      font-family: 'MedievalSharp', cursive;
      font-size: 16px;
      background: linear-gradient(90deg, var(--purple-primary), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .titlebar-buttons {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .tb-btn {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tb-btn.minimize { background: var(--accent-gold); }
    .tb-btn.close { background: #ef4444; }
    .tb-btn:hover { transform: scale(1.2); filter: brightness(1.3); }

    /* ── Model Badge ── */
    #model-badge {
      padding: 4px 12px;
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      border-bottom: 1px solid rgba(168, 85, 247, 0.08);
      background: var(--purple-subtle);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #model-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }

    #model-badge.no-key .dot { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); }

    /* ── Chat Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--purple-dim) transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--purple-dim);
      border-radius: 4px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: msgSlide 0.3s ease-out;
    }

    @keyframes msgSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
    }

    .message.wizard {
      align-self: flex-start;
    }

    .msg-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .user .msg-bubble {
      background: linear-gradient(135deg, var(--purple-dim), var(--purple-primary));
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.3);
    }

    .wizard .msg-bubble {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      padding: 10px 16px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple-primary);
      animation: typingBounce 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Suggestions ── */
    #suggestions {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .suggestion-chip {
      padding: 5px 12px;
      font-size: 11px;
      border: 1px solid var(--border-color);
      background: var(--purple-subtle);
      color: var(--text-secondary);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      background: rgba(168, 85, 247, 0.2);
      border-color: var(--purple-primary);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ── Input Area ── */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      background: rgba(12, 6, 24, 0.6);
      flex-shrink: 0;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 40px;
      transition: border-color 0.2s;
    }

    #message-input::placeholder {
      color: var(--text-dim);
    }

    #message-input:focus {
      border-color: var(--purple-primary);
      box-shadow: 0 0 0 2px var(--purple-glow);
    }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--purple-primary), var(--purple-dim));
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(168, 85, 247, 0.3);
    }

    #send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(168, 85, 247, 0.5);
    }

    #send-btn:active {
      transform: scale(0.95);
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Welcome State ── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 20px;
      text-align: center;
    }

    #welcome .wizard-emoji {
      font-size: 56px;
      animation: floatWiz 3s ease-in-out infinite;
    }

    @keyframes floatWiz {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    #welcome h2 {
      font-family: 'MedievalSharp', cursive;
      font-size: 22px;
      background: linear-gradient(90deg, var(--purple-primary), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #welcome p {
      font-size: 13px;
      color: var(--text-secondary);
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div id="titlebar">
      <div id="titlebar-left">
        <div id="titlebar-icon">🧙</div>
        <span id="titlebar-title">The Wizard's Chamber</span>
      </div>
      <div class="titlebar-buttons">
        <button class="tb-btn minimize" onclick="wizard.minimizeChat()"></button>
        <button class="tb-btn close" onclick="wizard.closeChat()"></button>
      </div>
    </div>

    <!-- Model Badge -->
    <div id="model-badge">
      <span class="dot"></span>
      <span id="model-name">Loading...</span>
    </div>

    <!-- Welcome / Messages -->
    <div id="welcome">
      <div class="wizard-emoji">🧙‍♂️</div>
      <h2>Greetings, Traveler!</h2>
      <p>I am your Desktop Wizard, perched upon The Arcane Ledge. Ask me anything, and I shall consult the vast libraries of the digital realm.</p>
    </div>

    <div id="messages" style="display: none;"></div>

    <!-- Suggestions -->
    <div id="suggestions">
      <div class="suggestion-chip" onclick="sendSuggestion('Tell me a wizard joke')">🎭 Tell a joke</div>
      <div class="suggestion-chip" onclick="sendSuggestion('What can you do?')">✨ Your powers</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Give me a fun fact')">📚 Fun fact</div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <textarea id="message-input" placeholder="Speak to the wizard..." rows="1" autofocus></textarea>
      <button id="send-btn" onclick="sendMessage()">⚡</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const modelBadge = document.getElementById('model-badge');
    const modelName = document.getElementById('model-name');
    const suggestionsEl = document.getElementById('suggestions');

    let chatHistory = [];
    let isStreaming = false;
    let currentStreamEl = null;

    // ── Init ──
    async function init() {
      const config = await wizard.getConfig();
      updateModelBadge(config);
    }

    function updateModelBadge(config) {
      if (!config.apiKey) {
        modelBadge.classList.add('no-key');
        modelName.textContent = '⚠ No API Key — Open Arcane Settings';
        modelBadge.style.cursor = 'pointer';
        modelBadge.onclick = () => wizard.openSettings();
      } else {
        modelBadge.classList.remove('no-key');
        modelName.textContent = config.model;
        modelBadge.style.cursor = 'default';
        modelBadge.onclick = null;
      }
    }

    // ── Messages ──
    function addMessage(role, content) {
      if (welcomeEl.style.display !== 'none') {
        welcomeEl.style.display = 'none';
        messagesEl.style.display = 'flex';
      }

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'You' : '🧙 Wizard';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = content;

      msg.appendChild(label);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return bubble;
    }

    function addStreamingMessage() {
      if (welcomeEl.style.display !== 'none') {
        welcomeEl.style.display = 'none';
        messagesEl.style.display = 'flex';
      }

      const msg = document.createElement('div');
      msg.className = 'message wizard';

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = '🧙 Wizard';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';
      bubble.appendChild(indicator);

      msg.appendChild(label);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return bubble;
    }

    // ── Send ──
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isStreaming) return;

      // Hide suggestions after first message
      suggestionsEl.style.display = 'none';

      addMessage('user', text);
      chatHistory.push({ role: 'user', content: text });
      inputEl.value = '';
      autoResizeInput();

      isStreaming = true;
      sendBtn.disabled = true;
      currentStreamEl = addStreamingMessage();

      const result = await wizard.sendChat(chatHistory);

      if (result.error) {
        currentStreamEl.textContent = `⚠ ${result.error}`;
        currentStreamEl.style.color = '#ef4444';
      }
      // Content is handled by streaming chunks

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function sendSuggestion(text) {
      inputEl.value = text;
      sendMessage();
    }

    // ── Streaming Chunks ──
    let streamContent = '';
    wizard.onChatChunk((chunk) => {
      if (!currentStreamEl) return;

      // Remove typing indicator on first chunk
      const indicator = currentStreamEl.querySelector('.typing-indicator');
      if (indicator) {
        indicator.remove();
        streamContent = '';
      }

      streamContent += chunk;
      currentStreamEl.textContent = streamContent;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    wizard.onChatComplete((fullText) => {
      if (currentStreamEl) {
        currentStreamEl.textContent = fullText;
      }
      chatHistory.push({ role: 'assistant', content: fullText });
      streamContent = '';
      currentStreamEl = null;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    // ── Config updates ──
    wizard.onConfigUpdate((config) => updateModelBadge(config));

    // ── Input handling ──
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', autoResizeInput);

    function autoResizeInput() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    }

    // Init
    init();
  </script>
</body>
</html>
