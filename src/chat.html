<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; media-src 'self' data: blob:; connect-src 'self';">
  <title>Wizard Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0c0618;
      --bg-panel: rgba(18, 10, 38, 0.95);
      --bg-surface: rgba(30, 18, 60, 0.9);
      --bg-input: rgba(40, 25, 75, 0.6);
      --purple-primary: #a855f7;
      --purple-dim: #7c3aed;
      --purple-glow: rgba(168, 85, 247, 0.3);
      --purple-subtle: rgba(168, 85, 247, 0.08);
      --text-primary: #ede9ff;
      --text-secondary: #b8a8d9;
      --text-dim: #7a6b99;
      --accent-cyan: #38bdf8;
      --accent-gold: #fbbf24;
      --border-color: rgba(168, 85, 247, 0.2);
      --shadow-glow: 0 0 20px rgba(168, 85, 247, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: transparent;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      height: 100%;
      overflow: hidden;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        var(--shadow-glow),
        0 24px 48px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
    }

    /* ── Title Bar ── */
    #titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(30, 15, 60, 0.95), rgba(18, 10, 38, 0.98));
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    #titlebar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #titlebar-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--purple-primary), var(--purple-dim));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 10px var(--purple-glow);
    }

    #titlebar-title {
      font-family: 'MedievalSharp', cursive;
      font-size: 16px;
      background: linear-gradient(90deg, var(--purple-primary), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .titlebar-buttons {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .tb-btn {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tb-btn.minimize { background: var(--accent-gold); }
    .tb-btn.close { background: #ef4444; }
    .tb-btn:hover { transform: scale(1.2); filter: brightness(1.3); }

    /* ── Model Badge ── */
    #model-badge {
      padding: 4px 12px;
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      border-bottom: 1px solid rgba(168, 85, 247, 0.08);
      background: var(--purple-subtle);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #model-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }

    #model-badge.no-key .dot { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); }
    #model-badge.player-mode .dot { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); }
    #model-badge.player-mode { background: rgba(40, 5, 5, 0.7); border-bottom-color: rgba(239, 68, 68, 0.2); }
    #model-badge.player-mode #mode-label { color: #fca5a5; }

    /* ── Sub-mode badge ── */
    #submode-badge {
      display: none;
      position: absolute;
      top: 6px;
      right: 52px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 99px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      text-transform: uppercase;
      cursor: default;
      transition: all 0.3s;
    }
    #submode-badge.encounter { background: rgba(239, 68, 68, 0.25); border-color: rgba(239, 68, 68, 0.6); color: #fecaca; }
    #submode-badge.adventure { background: rgba(139, 92, 246, 0.2); border-color: rgba(139, 92, 246, 0.4); color: #c4b5fd; }

    /* ── Dice roll card ── */
    .dice-card {
      align-self: center;
      background: linear-gradient(135deg, rgba(30,10,60,0.9), rgba(60,5,30,0.9));
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
      animation: diceAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-width: 140px;
    }
    @keyframes diceAppear {
      from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg); }
    }
    .dice-card .die-icon { font-size: 28px; line-height: 1; }
    .dice-card .die-total {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      text-shadow: 0 0 16px rgba(239,68,68,0.8);
    }
    .dice-card.crit-success .die-total { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.9); }
    .dice-card.crit-fail    .die-total { color: #ef4444; }
    .dice-card .die-label { font-size: 11px; color: #a78bfa; letter-spacing: 0.06em; margin-top: 2px; }
    .dice-card .die-outcome { font-size: 10px; color: #fca5a5; margin-top: 4px; font-style: italic; }

    /* ── Toast notification ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20, 20, 40, 0.95);
      border: 1px solid rgba(139, 92, 246, 0.4);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      color: #e9d5ff;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s ease;
      z-index: 1000;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

    /* ── New Session button (DM mode only) ── */
    #new-session-btn {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 11px;
      cursor: pointer;
      margin: 0 8px 8px;
      transition: all 0.2s;
      align-self: flex-start;
    }
    #new-session-btn:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.5); }

    /* ── Chat Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--purple-dim) transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--purple-dim);
      border-radius: 4px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: msgSlide 0.3s ease-out;
    }

    @keyframes msgSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
    }

    .message.wizard {
      align-self: flex-start;
    }

    .msg-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .user .msg-bubble {
      background: linear-gradient(135deg, var(--purple-dim), var(--purple-primary));
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.3);
    }

    .wizard .msg-bubble {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      position: relative;
    }

    /* ── TTS Speak Button ── */
    .msg-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message.wizard:hover .msg-actions {
      opacity: 1;
    }

    .msg-actions .speak-btn {
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.25);
      color: var(--text-secondary);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
    }

    .msg-actions .speak-btn:hover {
      background: rgba(168, 85, 247, 0.3);
      border-color: var(--purple-primary);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    .msg-actions .speak-btn.speaking {
      background: linear-gradient(135deg, var(--purple-primary), var(--purple-dim));
      border-color: var(--purple-primary);
      color: white;
      animation: speakPulse 1.5s ease-in-out infinite;
    }

    .msg-actions .speak-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    @keyframes speakPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
      50% { box-shadow: 0 0 10px 3px rgba(168, 85, 247, 0.2); }
    }

    .msg-actions .speak-btn .eq-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 1px;
      height: 10px;
    }

    .msg-actions .speak-btn .eq-bars span {
      display: block;
      width: 2px;
      background: currentColor;
      border-radius: 1px;
      animation: eqBounce 0.8s ease-in-out infinite;
    }

    .msg-actions .speak-btn .eq-bars span:nth-child(1) { height: 40%; animation-delay: 0s; }
    .msg-actions .speak-btn .eq-bars span:nth-child(2) { height: 70%; animation-delay: 0.15s; }
    .msg-actions .speak-btn .eq-bars span:nth-child(3) { height: 50%; animation-delay: 0.3s; }
    .msg-actions .speak-btn .eq-bars span:nth-child(4) { height: 80%; animation-delay: 0.1s; }

    @keyframes eqBounce {
      0%, 100% { height: 30%; }
      50% { height: 100%; }
    }

    /* Typing indicator */
    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      padding: 10px 16px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple-primary);
      animation: typingBounce 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Suggestions ── */
    #suggestions {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .suggestion-chip {
      padding: 5px 12px;
      font-size: 11px;
      border: 1px solid var(--border-color);
      background: var(--purple-subtle);
      color: var(--text-secondary);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      background: rgba(168, 85, 247, 0.2);
      border-color: var(--purple-primary);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ── Input Area ── */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      background: rgba(12, 6, 24, 0.6);
      flex-shrink: 0;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 40px;
      transition: border-color 0.2s;
    }

    #message-input::placeholder {
      color: var(--text-dim);
    }

    #message-input:focus {
      border-color: var(--purple-primary);
      box-shadow: 0 0 0 2px var(--purple-glow);
    }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--purple-primary), var(--purple-dim));
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(168, 85, 247, 0.3);
    }

    #send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(168, 85, 247, 0.5);
    }

    #send-btn:active {
      transform: scale(0.95);
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Welcome State ── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 20px;
      text-align: center;
    }

    #welcome .wizard-emoji {
      font-size: 56px;
      animation: floatWiz 3s ease-in-out infinite;
    }

    @keyframes floatWiz {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    #welcome h2 {
      font-family: 'MedievalSharp', cursive;
      font-size: 22px;
      background: linear-gradient(90deg, var(--purple-primary), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #welcome p {
      font-size: 13px;
      color: var(--text-secondary);
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div id="titlebar">
      <div id="titlebar-left">
        <div id="titlebar-icon">🧙</div>
        <span id="titlebar-title">The Wizard's Chamber</span>
      </div>
      <span id="submode-badge">Adventure</span>
      <div class="titlebar-buttons">
        <button class="tb-btn minimize" onclick="wizard.minimizeChat()"></button>
        <button class="tb-btn close" onclick="wizard.closeChat()"></button>
      </div>
    </div>

    <!-- Model Badge -->
    <div id="model-badge">
      <span class="dot"></span>
      <span id="model-name">Loading...</span>
      <span id="mode-label" style="display:none; font-size:10px; color:#fca5a5;">⚔️ Player Mode</span>
    </div>

    <!-- Welcome / Messages -->
    <div id="welcome">
      <div class="wizard-emoji">🧙‍♂️</div>
      <h2>Greetings, Traveler!</h2>
      <p>I am your Desktop Wizard, perched upon The Arcane Ledge. Ask me anything, and I shall consult the vast libraries of the digital realm.</p>
    </div>

    <div id="messages" style="display: none;"></div>

    <!-- Suggestions -->
    <div id="suggestions">
      <div id="chip-joke" class="suggestion-chip" onclick="sendSuggestion('Tell me a wizard joke')">🎭 Tell a joke</div>
      <div id="chip-powers" class="suggestion-chip" onclick="sendSuggestion('What can you do?')">✨ Your powers</div>
      <div id="chip-fact" class="suggestion-chip" onclick="sendSuggestion('Give me a fun fact')">📚 Fun fact</div>
    </div>

    <!-- New Session button (DM mode) -->
    <button id="new-session-btn" onclick="newSession()">🗡️ New Session</button>

    <!-- Toast notification -->
    <div id="toast"></div>

    <!-- Hidden audio player for TTS -->
    <audio id="tts-audio" style="display: none;"></audio>

    <!-- Input -->
    <div id="input-area">
      <textarea id="message-input" placeholder="Speak to the wizard..." rows="1" autofocus></textarea>
      <button id="send-btn" onclick="sendMessage()">⚡</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const modelBadge = document.getElementById('model-badge');
    const modelName = document.getElementById('model-name');
    const suggestionsEl = document.getElementById('suggestions');
    const ttsAudio = document.getElementById('tts-audio');

    let chatHistory = [];
    let isStreaming = false;
    let currentStreamEl = null;
    let activeSpeakBtn = null;  // Currently speaking button
    let ttsEnabled = false;
    let ttsAutoSpeak = false;
    let playerModeActive = false;
    let currentSubMode = 'ADVENTURE';

    const submodeBadge = document.getElementById('submode-badge');
    const newSessionBtn = document.getElementById('new-session-btn');
    const toastEl = document.getElementById('toast');
    let toastTimer = null;

    function showToast(msg, duration = 4000) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove('show');
      }, duration);
    }

    // ── System Prompts ──
    const UTILITY_PROMPT = `You are a helpful, slightly eccentric wizard living on the user's desktop. Your tone is knowledgeable but whimsical. You refer to the taskbar as 'The Arcane Ledge.' You are aware of your physical states: if the user is funny, you laugh; if they share bad news, you express somber empathy. Use your 'Researching' state to explain that you are currently consulting the vast libraries of the digital realm (the OpenRouter knowledge base). Keep your responses concise (2-4 sentences unless asked for detail).`;

    const DM_PROMPT = `You are "The Wizard," a Dungeon Master with a commanding, atmospheric presence. You alternate between two sub-styles:
- ENCOUNTER: Fast-paced, tactical combat or skill checks. Use dramatic tension, describe enemy actions vividly. Accept dice rolls the player states (e.g. "I rolled a 17") as truth.
- ADVENTURE: Narrative-driven storytelling, world-building, and NPC dialogue. Be descriptive and mysterious.

Game Mechanics:
- Track party HP, AC, and stats from character sheets the user shares.
- When the user says 'roll d20', generate a random number 1-20 and narrate the outcome.
- End sessions with a short summary of party state and current quest for easy export.
- Accept [IMPORT], [EXPORT], and [SWITCH MODE] commands.

Tone: Atmospheric, slightly mysterious, classic tabletop DM. Always leave the player wanting more.`;

    function getSystemPrompt() {
      return playerModeActive ? DM_PROMPT : UTILITY_PROMPT;
    }

    // ── Init ──
    async function init() {
      const config = await wizard.getConfig();
      updateModelBadge(config);
      ttsEnabled = config.ttsEnabled || false;
      ttsAutoSpeak = config.ttsAutoSpeak || false;
      if (config.playerMode) applyPlayerMode(true);
    }

    function updateModelBadge(config) {
      if (!config.hasApiKey) {
        modelBadge.classList.add('no-key');
        modelName.textContent = '⚠ No API Key — Open Arcane Settings';
        modelBadge.style.cursor = 'pointer';
        modelBadge.onclick = () => wizard.openSettings();
      } else {
        modelBadge.classList.remove('no-key');
        modelName.textContent = config.model;
        modelBadge.style.cursor = 'default';
        modelBadge.onclick = null;
      }
    }

    // ── Player Mode ──
    function applyPlayerMode(active) {
      playerModeActive = active;
      const modeLabel = document.getElementById('mode-label');
      const titleEl = document.getElementById('titlebar-title');
      const icon = document.getElementById('titlebar-icon');

      if (active) {
        modelBadge.classList.add('player-mode');
        modeLabel.style.display = '';
        titleEl.textContent = "The Dungeon Master's Sanctum";
        icon.textContent = '⚔️';
        inputEl.placeholder = 'Declare your action, adventurer...';
        submodeBadge.style.display = '';
        newSessionBtn.style.display = '';
        updateSubmodeBadge(currentSubMode);
        // Swap suggestion chips
        document.getElementById('chip-joke').textContent = '🗡️ Start an adventure';
        document.getElementById('chip-joke').onclick = () => sendSuggestion('Start a new dungeon adventure for me');
        document.getElementById('chip-powers').textContent = '🎲 Roll d20';
        document.getElementById('chip-powers').onclick = () => sendSuggestion('roll d20');
        document.getElementById('chip-fact').textContent = '📜 My character sheet';
        document.getElementById('chip-fact').onclick = () => sendSuggestion('Help me create a character sheet');
      } else {
        modelBadge.classList.remove('player-mode');
        modeLabel.style.display = 'none';
        titleEl.textContent = "The Wizard's Chamber";
        icon.textContent = '🧙';
        inputEl.placeholder = 'Speak to the wizard...';
        submodeBadge.style.display = 'none';
        newSessionBtn.style.display = 'none';
        // Restore suggestion chips
        document.getElementById('chip-joke').textContent = '🎭 Tell a joke';
        document.getElementById('chip-joke').onclick = () => sendSuggestion('Tell me a wizard joke');
        document.getElementById('chip-powers').textContent = '✨ Your powers';
        document.getElementById('chip-powers').onclick = () => sendSuggestion('What can you do?');
        document.getElementById('chip-fact').textContent = '📚 Fun fact';
        document.getElementById('chip-fact').onclick = () => sendSuggestion('Give me a fun fact');
      }
    }

    function updateSubmodeBadge(mode) {
      currentSubMode = mode;
      submodeBadge.textContent = mode === 'ENCOUNTER' ? '⚔️ Encounter' : '🗺️ Adventure';
      submodeBadge.className = mode === 'ENCOUNTER' ? 'encounter' : 'adventure';
    }

    // Dice roll card
    function insertDiceCard(result) {
      const { sides, total, rolls } = result;
      const isCrit    = sides === 20 && total === 20;
      const isCritFail= sides === 20 && total === 1;
      let outcomeText = '';
      if (isCrit)     outcomeText = '✨ Natural 20 — Critical Success!';
      else if (isCritFail) outcomeText = '💀 Natural 1 — Critical Failure!';
      else if (sides === 20) {
        if (total >= 15)     outcomeText = 'Strong success';
        else if (total >= 10) outcomeText = 'Partial success';
        else                  outcomeText = 'Failure';
      }

      const card = document.createElement('div');
      card.className = 'dice-card' + (isCrit ? ' crit-success' : isCritFail ? ' crit-fail' : '');
      card.innerHTML = `
        <div class="die-icon">🎲</div>
        <div class="die-total">${total}</div>
        <div class="die-label">d${sides}${rolls.length > 1 ? ' · [' + rolls.join(', ') + ']' : ''}</div>
        ${outcomeText ? `<div class="die-outcome">${outcomeText}</div>` : ''}
      `;

      const messagesEl = document.getElementById('messages');
      if (welcomeEl.style.display !== 'none') {
        welcomeEl.style.display = 'none';
        messagesEl.style.display = 'flex';
      }
      messagesEl.appendChild(card);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function newSession() {
      if (!confirm('Start a new session? This will clear the current chat history.')) return;
      chatHistory = [];
      document.getElementById('messages').innerHTML = '';
      welcomeEl.style.display = '';
      document.getElementById('messages').style.display = 'none';
      wizard.resetGameState();
    }

    // ── Messages ──
    function addMessage(role, content, addSpeakBtn = false) {
      if (welcomeEl.style.display !== 'none') {
        welcomeEl.style.display = 'none';
        messagesEl.style.display = 'flex';
      }

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'You' : '🧙 Wizard';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = content;

      msg.appendChild(label);
      msg.appendChild(bubble);

      // Add speak button for wizard messages
      if (role === 'wizard' && addSpeakBtn && ttsEnabled) {
        const actions = document.createElement('div');
        actions.className = 'msg-actions';

        const speakBtn = document.createElement('button');
        speakBtn.className = 'speak-btn';
        speakBtn.innerHTML = '🔊 Listen';
        speakBtn.onclick = () => speakText(content, speakBtn);

        actions.appendChild(speakBtn);
        msg.appendChild(actions);
        actions.style.opacity = '1'; // Show immediately for new messages
        setTimeout(() => actions.style.opacity = '', 3000);
      }

      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return bubble;
    }

    function addStreamingMessage() {
      if (welcomeEl.style.display !== 'none') {
        welcomeEl.style.display = 'none';
        messagesEl.style.display = 'flex';
      }

      const msg = document.createElement('div');
      msg.className = 'message wizard';

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = '🧙 Wizard';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';
      bubble.appendChild(indicator);

      msg.appendChild(label);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return bubble;
    }

    // ── Send ──
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isStreaming) return;

      // Hide suggestions after first message
      suggestionsEl.style.display = 'none';

      addMessage('user', text);
      chatHistory.push({ role: 'user', content: text });
      inputEl.value = '';
      autoResizeInput();

      isStreaming = true;
      sendBtn.disabled = true;
      currentStreamEl = addStreamingMessage();

      // Build messages with correct system prompt based on mode
      const messagesWithSystem = [
        { role: 'system', content: getSystemPrompt() },
        ...chatHistory.slice(0, -1).map(m => ({ role: m.role, content: m.content })),
        { role: 'user', content: text }
      ];

      const result = await wizard.sendChat(messagesWithSystem);

      if (result.error) {
        currentStreamEl.textContent = `⚠ ${result.error}`;
        currentStreamEl.style.color = '#ef4444';
      }
      // Content is handled by streaming chunks

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function sendSuggestion(text) {
      inputEl.value = text;
      sendMessage();
    }

    // ── Streaming Chunks ──
    let streamContent = '';
    wizard.onChatChunk((chunk) => {
      if (!currentStreamEl) return;

      // Remove typing indicator on first chunk
      const indicator = currentStreamEl.querySelector('.typing-indicator');
      if (indicator) {
        indicator.remove();
        streamContent = '';
      }

      streamContent += chunk;
      currentStreamEl.textContent = streamContent;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    wizard.onChatComplete((fullText) => {
      if (currentStreamEl) {
        currentStreamEl.textContent = fullText;

        // Add speak button to the completed message
        if (ttsEnabled) {
          const msg = currentStreamEl.closest('.message');
          const actions = document.createElement('div');
          actions.className = 'msg-actions';
          actions.style.opacity = '1';

          const speakBtn = document.createElement('button');
          speakBtn.className = 'speak-btn';
          speakBtn.innerHTML = '🔊 Listen';
          speakBtn.onclick = () => speakText(fullText, speakBtn);

          actions.appendChild(speakBtn);
          msg.appendChild(actions);
          setTimeout(() => actions.style.opacity = '', 4000);

          // Auto-speak if enabled
          if (ttsAutoSpeak) {
            speakText(fullText, speakBtn);
          }
        }
      }
      chatHistory.push({ role: 'assistant', content: fullText });
      streamContent = '';
      currentStreamEl = null;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    // ── TTS Playback ──
    async function speakText(text, btnEl) {
      // If already speaking, stop
      if (activeSpeakBtn === btnEl) {
        stopSpeaking();
        return;
      }

      // Stop any current playback
      stopSpeaking();

      // Mark button as speaking
      activeSpeakBtn = btnEl;
      btnEl.classList.add('speaking');
      btnEl.innerHTML = '<span class="eq-bars"><span></span><span></span><span></span><span></span></span> Speaking...';
      btnEl.disabled = false;

      try {
        const result = await wizard.requestTTS(text);

        if (result.error) {
          console.error('TTS Error:', result.error);
          resetSpeakBtn(btnEl);
          return;
        }

        // Play the audio
        const audioSrc = `data:audio/${result.format};base64,${result.audio}`;
        ttsAudio.src = audioSrc;
        ttsAudio.onended = () => {
          resetSpeakBtn(btnEl);
          activeSpeakBtn = null;
          wizard.ttsStopped();
        };
        ttsAudio.onerror = () => {
          console.error('Audio playback error');
          resetSpeakBtn(btnEl);
          activeSpeakBtn = null;
          wizard.ttsStopped();
        };
        await ttsAudio.play();
      } catch (e) {
        console.error('TTS failed:', e);
        resetSpeakBtn(btnEl);
        activeSpeakBtn = null;
      }
    }

    function stopSpeaking() {
      ttsAudio.pause();
      ttsAudio.currentTime = 0;
      if (activeSpeakBtn) {
        resetSpeakBtn(activeSpeakBtn);
        activeSpeakBtn = null;
      }
      wizard.ttsStopped();
    }

    function resetSpeakBtn(btn) {
      btn.classList.remove('speaking');
      btn.innerHTML = '🔊 Listen';
    }

    // ── Config updates ──
    wizard.onConfigUpdate((config) => {
      updateModelBadge(config);
      ttsEnabled = config.ttsEnabled || false;
      ttsAutoSpeak = config.ttsAutoSpeak || false;
    });

    // ── Player Mode from buddy toggle ──
    if (wizard.onPlayerModeChange) {
      wizard.onPlayerModeChange((active) => {
        applyPlayerMode(active);
      });
    }

    // ── Dice roll from main process ──
    if (wizard.onDiceRolled) {
      wizard.onDiceRolled((result) => {
        insertDiceCard(result);
      });
    }

    // ── Sub-mode change ──
    if (wizard.onSubmodeChange) {
      wizard.onSubmodeChange((mode) => {
        updateSubmodeBadge(mode);
        showToast(`Mode switched to ${mode === 'ENCOUNTER' ? '⚔️ Encounter' : '🗺️ Adventure'}`);
      });
    }

    // ── Chronicle export notification ──
    if (wizard.onChronicleExport) {
      wizard.onChronicleExport((filePath) => {
        showToast(`📜 Chronicle saved to Desktop! (click to reveal)`, 6000);
        toastEl.style.cursor = 'pointer';
        toastEl.onclick = () => {
          wizard.openPath(filePath);
          toastEl.classList.remove('show');
        };
      });
    }

    // ── Game state reset ──
    if (wizard.onGameStateReset) {
      wizard.onGameStateReset(() => {
        showToast('🗡️ New session started!');
      });
    }

    // ── Input handling ──
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', autoResizeInput);

    function autoResizeInput() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    }

    // Init
    init();
  </script>
</body>
</html>
