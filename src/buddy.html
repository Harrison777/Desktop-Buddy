<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>Desktop Wizard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
      user-select: none;
    }

    #wizard-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    /* Speech bubble */
    #speech-bubble {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 10, 40, 0.92);
      border: 2px solid #a855f7;
      border-radius: 12px;
      padding: 8px 12px;
      color: #e0d0ff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      max-width: 170px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      box-shadow:
        0 0 12px rgba(168, 85, 247, 0.3),
        inset 0 0 8px rgba(168, 85, 247, 0.1);
    }

    #speech-bubble.visible {
      opacity: 1;
    }

    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #a855f7;
    }

    /* Sprite canvas */
    #wizard-sprite {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
      transition: filter 0.3s ease;
    }

    #wizard-sprite:hover {
      filter: brightness(1.15) drop-shadow(0 0 8px rgba(168, 85, 247, 0.6));
    }

    /* Weather overlay canvas — sits on top of sprite */
    #weather-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Z bubbles for sleeping */
    .z-bubble {
      position: absolute;
      font-size: 18px;
      color: #c084fc;
      animation: floatZ 2s ease-out forwards;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(192, 132, 252, 0.6);
    }

    @keyframes floatZ {
      0% { opacity: 1; transform: translate(0, 0) scale(0.6); }
      50% { opacity: 0.8; transform: translate(-10px, -25px) scale(1); }
      100% { opacity: 0; transform: translate(-20px, -50px) scale(1.2); }
    }

    /* Glow ring under wizard */
    #glow-ring {
      position: absolute;
      bottom: 5px;
      width: 80px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(168, 85, 247, 0.4) 0%, transparent 70%);
      transition: all 0.5s ease;
    }

    #glow-ring.researching {
      background: radial-gradient(ellipse, rgba(56, 189, 248, 0.5) 0%, transparent 70%);
      animation: pulseGlow 1.5s ease-in-out infinite;
    }

    #glow-ring.sleeping {
      background: radial-gradient(ellipse, rgba(100, 100, 160, 0.2) 0%, transparent 70%);
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    /* State label */
    #state-label {
      position: absolute;
      bottom: -2px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 9px;
      color: rgba(200, 180, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="wizard-container">
    <div id="speech-bubble"></div>
    <canvas id="wizard-sprite" width="180" height="200"></canvas>
    <canvas id="weather-canvas" width="180" height="200"></canvas>
    <div id="glow-ring"></div>
    <div id="state-label" style="display:none;"></div>
  </div>

  <script>
    // ══════════════════════════════════════════════════
    // SPRITE SHEET LAYOUT
    // The generated image is a 1024x1024 JPEG
    // arranged in a 4-column × 3-row grid.
    //
    // Row 0: Idle, Talk1, Talk2, Talk3
    // Row 1: Talk4, Reading, Sleeping, (unused/sad)
    // Row 2: Laughing, Laughing2, Sad, Researching
    //
    // We map grid positions (col, row) to frame indices.
    // ══════════════════════════════════════════════════

    const DEFAULT_MANIFEST = {
      spriteSheet: 'wizard_spritesheet.png',
      layout: { type: 'grid', columns: 4, rows: 3 },
      states: {
        idle:        { frames: [0], fps: 1 },
        talking:     { frames: [1, 2, 3, 4], fps: 6 },
        reading:     { frames: [5], fps: 1 },
        sleeping:    { frames: [6], fps: 0.5 },
        laughing:    { frames: [7], fps: 2 },
        sad:         { frames: [8], fps: 1 },
        researching: { frames: [9], fps: 2 }
      },
      frames: {
        0: { grid: [0, 0] },
        1: { grid: [1, 0] },
        2: { grid: [2, 0] },
        3: { grid: [3, 0] },
        4: { grid: [0, 1] },
        5: { grid: [2, 1] },
        6: { grid: [3, 1] },
        7: { grid: [0, 2] },
        8: { grid: [2, 2] },
        9: { grid: [3, 2] }
      }
    };

    const canvas = document.getElementById('wizard-sprite');
    const ctx = canvas.getContext('2d');
    const weatherCanvas = document.getElementById('weather-canvas');
    const wCtx = weatherCanvas.getContext('2d');
    const speechBubble = document.getElementById('speech-bubble');
    const glowRing = document.getElementById('glow-ring');
    const stateLabel = document.getElementById('state-label');

    let spriteSheet = new Image();
    let processedFrames = {};  // Cache of pre-processed per-frame canvases
    let currentState = 'idle';
    let frameIndex = 0;
    let animTick = 0;
    let lastTime = 0;
    let breathOffset = 0;
    let zBubbleTimer = 0;
    let sheetReady = false;
    let actualCellW = 256;
    let actualCellH = 341;
    let wizardScale = 2; // default
    let animationManifest = DEFAULT_MANIFEST;
    let frameGrid = {};
    let frameMap = DEFAULT_MANIFEST.states;
    let driftOffsetX = 0;
    let hoverOffsetY = 0;
    let tiltRadians = 0;
    let squashX = 1;
    let squashY = 1;
    let blinkAmount = 0;
    let blinkClock = 0;
    let nextBlinkAt = 0;

    // ── Cursor / Eye-Tracking ──
    // gazeX, gazeY: normalized direction to cursor (-1…+1)
    // Updated every 100ms via IPC polling.
    let gazeX = 0;           // -1 = looking left, +1 = right
    let gazeY = 0;           // -1 = looking up,   +1 = down
    let gazeSmoothedX = 0;   // lerp-smoothed for silky movement
    let gazeSmoothedY = 0;
    let cursorDistance = 0;   // pixel distance from wizard to cursor

    // ══════════════════════════════════════════════════
    // WEATHER PARTICLE SYSTEM
    // Procedural particles — no sprite sheets needed.
    // Colors chosen to pop against the wizard's
    // navy-blue-and-purple palette.
    //
    // Rain:      Cyan (#00FFFF) needle-thin streaks
    // Snow:      Blue-tinted white + 1px black outline
    // Lightning: Neon Magenta bolts (arcane feel)
    //
    // The weather-canvas uses mix-blend-mode: screen
    // so dark pixels vanish and bright particles glow
    // additively over the wizard sprite.
    // ══════════════════════════════════════════════════

    let weatherMode = 'none'; // 'none' | 'rain' | 'snow' | 'lightning' | 'storm'
    let weatherParticles = [];
    let weatherIntensity = 0.6; // 0.0 – 1.0
    let lightningTimer = 0;
    let lightningFlash = 0;
    let lightningBolts = [];
    let windAngle = 0.15; // slight eastward wind

    // ── Rain Particle ──
    function spawnRainDrop() {
      return {
        type: 'rain',
        x: Math.random() * weatherCanvas.width * 1.4 - weatherCanvas.width * 0.2,
        y: -Math.random() * weatherCanvas.height * 0.5,
        vx: 0.6 + Math.random() * 0.8,
        vy: 5 + Math.random() * 7,
        length: 6 + Math.random() * 10,
        alpha: 0.35 + Math.random() * 0.55,
        width: 0.6 + Math.random() * 0.8
      };
    }

    // ── Snow Particle ──
    function spawnSnowflake() {
      const size = 1.5 + Math.random() * 3.5;
      return {
        type: 'snow',
        x: Math.random() * weatherCanvas.width * 1.3 - weatherCanvas.width * 0.15,
        y: -Math.random() * weatherCanvas.height * 0.3,
        vx: -0.15 + Math.random() * 0.3,
        vy: 0.5 + Math.random() * 1.5,
        size: size,
        alpha: 0.5 + Math.random() * 0.45,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 1.5 + Math.random() * 2,
        wobbleAmp: 0.4 + Math.random() * 0.6,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (-0.5 + Math.random()) * 0.03
      };
    }

    // ── Lightning Bolt Generator ──
    // Creates a jagged bolt from top to bottom with random forks.
    function generateLightningBolt() {
      const startX = weatherCanvas.width * 0.2 + Math.random() * weatherCanvas.width * 0.6;
      const points = [{ x: startX, y: 0 }];
      let cx = startX;
      let cy = 0;
      const segments = 6 + Math.floor(Math.random() * 8);
      const segH = weatherCanvas.height / segments;

      const forks = [];

      for (let i = 0; i < segments; i++) {
        cx += (-1 + Math.random() * 2) * (8 + Math.random() * 14);
        cy += segH * (0.7 + Math.random() * 0.5);
        points.push({ x: cx, y: cy });

        // Random fork (30% chance)
        if (Math.random() < 0.3 && i > 1 && i < segments - 1) {
          const forkPoints = [{ x: cx, y: cy }];
          let fx = cx;
          let fy = cy;
          const forkLen = 2 + Math.floor(Math.random() * 3);
          const forkDir = Math.random() < 0.5 ? -1 : 1;
          for (let j = 0; j < forkLen; j++) {
            fx += forkDir * (4 + Math.random() * 10);
            fy += segH * (0.4 + Math.random() * 0.35);
            forkPoints.push({ x: fx, y: fy });
          }
          forks.push(forkPoints);
        }
      }

      return {
        points,
        forks,
        life: 0.12 + Math.random() * 0.15,  // seconds
        maxLife: 0.12 + Math.random() * 0.15,
        thickness: 1.2 + Math.random() * 1.5
      };
    }

    // ── Weather Tick ──
    function updateWeather(dt) {
      if (weatherMode === 'none') {
        weatherParticles = [];
        lightningBolts = [];
        lightningFlash = 0;
        return;
      }

      const isRain = weatherMode === 'rain' || weatherMode === 'storm';
      const isSnow = weatherMode === 'snow';
      const isLightning = weatherMode === 'lightning' || weatherMode === 'storm';

      // ── Spawn particles ──
      if (isRain) {
        const targetCount = Math.floor(30 * weatherIntensity);
        const rainCount = weatherParticles.filter(p => p.type === 'rain').length;
        for (let i = rainCount; i < targetCount; i++) {
          weatherParticles.push(spawnRainDrop());
        }
      }
      if (isSnow) {
        const targetCount = Math.floor(25 * weatherIntensity);
        const snowCount = weatherParticles.filter(p => p.type === 'snow').length;
        for (let i = snowCount; i < targetCount; i++) {
          weatherParticles.push(spawnSnowflake());
        }
      }

      // ── Update particles ──
      for (let i = weatherParticles.length - 1; i >= 0; i--) {
        const p = weatherParticles[i];

        if (p.type === 'rain') {
          p.x += p.vx * dt * 60;
          p.y += p.vy * dt * 60;
          // Off-screen → respawn
          if (p.y > weatherCanvas.height + 10 || p.x > weatherCanvas.width + 20) {
            weatherParticles[i] = spawnRainDrop();
          }
        }

        if (p.type === 'snow') {
          p.wobble += p.wobbleSpeed * dt;
          p.x += (p.vx + Math.sin(p.wobble) * p.wobbleAmp) * dt * 60;
          p.y += p.vy * dt * 60;
          p.rotation += p.rotSpeed;
          if (p.y > weatherCanvas.height + 10) {
            weatherParticles[i] = spawnSnowflake();
          }
        }
      }

      // ── Lightning ──
      if (isLightning) {
        lightningTimer -= dt;
        if (lightningTimer <= 0) {
          // New bolt!
          lightningBolts.push(generateLightningBolt());
          lightningFlash = 0.7 + Math.random() * 0.3;
          lightningTimer = 1.5 + Math.random() * 4.0 / Math.max(0.1, weatherIntensity);
        }
      }

      // Update existing bolts
      for (let i = lightningBolts.length - 1; i >= 0; i--) {
        lightningBolts[i].life -= dt;
        if (lightningBolts[i].life <= 0) {
          lightningBolts.splice(i, 1);
        }
      }

      // Decay flash
      if (lightningFlash > 0) {
        lightningFlash -= dt * 4;
        if (lightningFlash < 0) lightningFlash = 0;
      }
    }

    // ── Draw Weather ──
    function drawWeather() {
      wCtx.clearRect(0, 0, weatherCanvas.width, weatherCanvas.height);

      if (weatherMode === 'none') return;

      // ── Lightning flash (ambient glow behind everything) ──
      if (lightningFlash > 0) {
        wCtx.fillStyle = `rgba(220, 180, 255, ${lightningFlash * 0.25})`;
        wCtx.fillRect(0, 0, weatherCanvas.width, weatherCanvas.height);
      }

      // ── Draw rain ──
      for (const p of weatherParticles) {
        if (p.type === 'rain') {
          wCtx.save();
          wCtx.strokeStyle = `rgba(0, 255, 255, ${p.alpha})`;
          wCtx.lineWidth = p.width;
          wCtx.lineCap = 'round';
          // Glow layer
          wCtx.shadowColor = '#00FFFF';
          wCtx.shadowBlur = 3;
          wCtx.beginPath();
          wCtx.moveTo(p.x, p.y);
          wCtx.lineTo(p.x + p.vx * 0.5, p.y + p.length);
          wCtx.stroke();
          wCtx.restore();
        }
      }

      // ── Draw snow ──
      for (const p of weatherParticles) {
        if (p.type === 'snow') {
          wCtx.save();
          wCtx.translate(p.x, p.y);
          wCtx.rotate(p.rotation);

          const r = p.size;

          // 1px black outline (so flakes don't vanish into white beard)
          wCtx.strokeStyle = `rgba(0, 0, 0, ${p.alpha * 0.6})`;
          wCtx.lineWidth = 1.2;

          // Draw a 6-pointed crystalline snowflake
          for (let arm = 0; arm < 6; arm++) {
            const angle = (arm / 6) * Math.PI * 2;
            const ex = Math.cos(angle) * r;
            const ey = Math.sin(angle) * r;
            // Outline
            wCtx.beginPath();
            wCtx.moveTo(0, 0);
            wCtx.lineTo(ex, ey);
            wCtx.stroke();
          }

          // Blue-tinted white fill on top
          wCtx.strokeStyle = `rgba(210, 230, 255, ${p.alpha})`;
          wCtx.lineWidth = 0.7;
          wCtx.shadowColor = '#D2E6FF';
          wCtx.shadowBlur = 2;

          for (let arm = 0; arm < 6; arm++) {
            const angle = (arm / 6) * Math.PI * 2;
            const ex = Math.cos(angle) * r;
            const ey = Math.sin(angle) * r;
            wCtx.beginPath();
            wCtx.moveTo(0, 0);
            wCtx.lineTo(ex, ey);
            wCtx.stroke();

            // Tiny branch detail on larger flakes
            if (r > 2.5) {
              const branchLen = r * 0.35;
              const mid = 0.6;
              const mx = Math.cos(angle) * r * mid;
              const my = Math.sin(angle) * r * mid;
              for (const side of [-1, 1]) {
                const bAngle = angle + side * 0.5;
                wCtx.beginPath();
                wCtx.moveTo(mx, my);
                wCtx.lineTo(mx + Math.cos(bAngle) * branchLen, my + Math.sin(bAngle) * branchLen);
                wCtx.stroke();
              }
            }
          }

          // Center dot
          wCtx.fillStyle = `rgba(210, 230, 255, ${p.alpha * 0.9})`;
          wCtx.beginPath();
          wCtx.arc(0, 0, 0.5, 0, Math.PI * 2);
          wCtx.fill();

          wCtx.restore();
        }
      }

      // ── Draw lightning bolts ──
      for (const bolt of lightningBolts) {
        const lifeRatio = bolt.life / bolt.maxLife;
        const alpha = lifeRatio;

        // Draw main bolt — Neon Magenta
        drawBoltPath(bolt.points, bolt.thickness, alpha);

        // Draw forks (thinner)
        for (const fork of bolt.forks) {
          drawBoltPath(fork, bolt.thickness * 0.5, alpha * 0.7);
        }
      }
    }

    function drawBoltPath(points, thickness, alpha) {
      if (points.length < 2) return;

      // Outer glow
      wCtx.save();
      wCtx.strokeStyle = `rgba(255, 0, 255, ${alpha * 0.4})`;
      wCtx.lineWidth = thickness * 4;
      wCtx.lineCap = 'round';
      wCtx.lineJoin = 'round';
      wCtx.shadowColor = '#FF00FF';
      wCtx.shadowBlur = 12;
      wCtx.beginPath();
      wCtx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        wCtx.lineTo(points[i].x, points[i].y);
      }
      wCtx.stroke();
      wCtx.restore();

      // Inner core — hot white-magenta
      wCtx.save();
      wCtx.strokeStyle = `rgba(255, 200, 255, ${alpha * 0.9})`;
      wCtx.lineWidth = thickness;
      wCtx.lineCap = 'round';
      wCtx.lineJoin = 'round';
      wCtx.shadowColor = '#FFC8FF';
      wCtx.shadowBlur = 4;
      wCtx.beginPath();
      wCtx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        wCtx.lineTo(points[i].x, points[i].y);
      }
      wCtx.stroke();
      wCtx.restore();
    }

    // ── Set weather from outside ──
    function setWeather(mode, intensity) {
      weatherMode = mode || 'none';
      if (typeof intensity === 'number') weatherIntensity = Math.max(0, Math.min(1, intensity));
      // Reset particles when changing mode
      weatherParticles = [];
      lightningBolts = [];
      lightningFlash = 0;
      lightningTimer = 0.5 + Math.random() * 2;

      // Sync weather canvas size to sprite canvas
      weatherCanvas.width = canvas.width;
      weatherCanvas.height = canvas.height;
      console.log(`Weather: ${weatherMode} @ ${(weatherIntensity * 100).toFixed(0)}%`);
    }

    // ── Scale Management ──
    const BASE_W = 90;
    const BASE_H = 100;

    async function applyScale(scale) {
      wizardScale = scale || 2;
      const w = Math.round(BASE_W * wizardScale);
      const h = Math.round(BASE_H * wizardScale);
      canvas.width = w;
      canvas.height = h;
      // Keep weather overlay in sync
      weatherCanvas.width = w;
      weatherCanvas.height = h;
      // Tell main process to resize the BrowserWindow
      wizard.resizeBuddy(wizardScale);
    }

    function isCalmState(state) {
      return state === 'idle' || state === 'reading' || state === 'researching';
    }

    function scheduleNextBlink(timestamp) {
      nextBlinkAt = timestamp + 1800 + Math.random() * 3200;
    }

    function updateMicroMotion(timestamp, dt) {
      if (!lastTime) {
        scheduleNextBlink(timestamp);
      }

      if (currentState === 'idle') {
        breathOffset = Math.sin(timestamp / 1400) * 0.85;
        driftOffsetX = Math.sin(timestamp / 2400) * 0.45 + Math.sin(timestamp / 5100) * 0.2;
        hoverOffsetY = Math.cos(timestamp / 3000) * 0.22;
        tiltRadians = Math.sin(timestamp / 4200) * 0.008;
        squashX = 1 + Math.sin(timestamp / 1400) * 0.003;
        squashY = 1 - Math.sin(timestamp / 1400) * 0.004;
      } else if (currentState === 'reading') {
        breathOffset = Math.sin(timestamp / 1700) * 0.45;
        driftOffsetX = Math.sin(timestamp / 3200) * 0.2;
        hoverOffsetY = Math.cos(timestamp / 2800) * 0.12;
        tiltRadians = Math.sin(timestamp / 3600) * 0.005;
        squashX = 1;
        squashY = 1;
      } else if (currentState === 'researching') {
        breathOffset = Math.sin(timestamp / 1100) * 0.35;
        driftOffsetX = Math.sin(timestamp / 1500) * 0.18;
        hoverOffsetY = Math.cos(timestamp / 1300) * 0.18;
        tiltRadians = Math.sin(timestamp / 1900) * 0.006;
        squashX = 1;
        squashY = 1;
      } else if (currentState === 'sleeping') {
        breathOffset = Math.sin(timestamp / 1650) * 1.2;
        driftOffsetX = Math.sin(timestamp / 3600) * 0.12;
        hoverOffsetY = 0;
        tiltRadians = Math.sin(timestamp / 4200) * 0.004;
        squashX = 1 + Math.sin(timestamp / 1650) * 0.003;
        squashY = 1 - Math.sin(timestamp / 1650) * 0.005;
      } else {
        breathOffset = 0;
        driftOffsetX = 0;
        hoverOffsetY = 0;
        tiltRadians = 0;
        squashX = 1;
        squashY = 1;
      }

      if (!isCalmState(currentState)) {
        blinkAmount = 0;
        blinkClock = 0;
        nextBlinkAt = timestamp + 1200;
        return;
      }

      if (!nextBlinkAt) {
        scheduleNextBlink(timestamp);
      }

      if (timestamp >= nextBlinkAt) {
        blinkClock += dt * 7.5;
        const blinkPhase = Math.min(blinkClock, 1);
        blinkAmount = Math.sin(blinkPhase * Math.PI) ** 1.6;
        if (blinkClock >= 1) {
          blinkClock = 0;
          blinkAmount = 0;
          scheduleNextBlink(timestamp);
        }
      } else {
        blinkAmount = 0;
      }
    }

    function drawBlinkOverlay() {
      if (blinkAmount <= 0.01) return;
      // Only draw blink overlay when face is in standard upright position
      const uprightStates = ['idle', 'walking', 'talking', 'laughing', 'sad', 'happy', 'thinking'];
      if (!uprightStates.includes(currentState)) return;

      const eyeWidth = canvas.width * 0.038;
      const eyeGap = canvas.width * 0.10;
      const eyeY = canvas.height * 0.38 + hoverOffsetY * 0.08;
      const eyeCenterX = canvas.width * 0.5 + canvas.width * 0.03;
      const leftCenterX = eyeCenterX - eyeGap * 0.5;
      const rightCenterX = eyeCenterX + eyeGap * 0.5;

      // Eyelid closes from above — a small filled ellipse per eye
      const lidHeight = canvas.height * 0.015 * blinkAmount;

      ctx.save();
      // Use a skin-tone that blends with the wizard's face
      ctx.fillStyle = `rgba(198, 156, 109, ${0.7 + blinkAmount * 0.3})`;

      for (const centerX of [leftCenterX, rightCenterX]) {
        ctx.beginPath();
        ctx.ellipse(centerX, eyeY - lidHeight * 0.2, eyeWidth * 0.8, lidHeight, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    // ── Cursor Tracking (Eye-Following) ──
    // Polls global cursor position every 100ms and computes
    // a normalised gaze direction for the wizard's pupils.
    function startCursorTracking() {
      setInterval(async () => {
        try {
          const pos = await wizard.getCursorPos();
          if (!pos) return;

          const dx = pos.cursorX - pos.wizX;
          const dy = pos.cursorY - pos.wizY;
          cursorDistance = Math.sqrt(dx * dx + dy * dy);

          // Normalize to -1…+1 with a soft clamp
          // 300px away = full gaze, closer = proportional
          const maxDist = 300;
          const norm = Math.min(cursorDistance / maxDist, 1);
          const angle = Math.atan2(dy, dx);

          gazeX = Math.cos(angle) * norm;
          gazeY = Math.sin(angle) * norm;
        } catch (e) {
          // Silently ignore — window might be closing
        }
      }, 100);
    }

    // Smooth the gaze each frame for natural eye movement
    function updateGaze(dt) {
      const lerpSpeed = 8; // higher = snappier
      const t = 1 - Math.exp(-lerpSpeed * dt);
      gazeSmoothedX += (gazeX - gazeSmoothedX) * t;
      gazeSmoothedY += (gazeY - gazeSmoothedY) * t;
    }

    // Draw dynamic pupil dots that follow the cursor.
    // These sit OVER the sprite's painted eyes.
    function drawGazePupils() {
      // Only draw pupils when face is in standard upright position
      const uprightStates = ['idle', 'walking', 'talking', 'laughing', 'sad', 'happy', 'thinking'];
      if (!uprightStates.includes(currentState)) return;
      if (blinkAmount > 0.7) return;

      // Eye geometry — matches drawBlinkOverlay positions
      const eyeGap = canvas.width * 0.10;
      const eyeY = canvas.height * 0.38 + hoverOffsetY * 0.08;
      const eyeCenterX = canvas.width * 0.5 + canvas.width * 0.03;
      const leftCenterX = eyeCenterX - eyeGap * 0.5;
      const rightCenterX = eyeCenterX + eyeGap * 0.5;

      // How far the pupil can shift (in pixels)
      const maxShiftX = canvas.width * 0.018;
      const maxShiftY = canvas.height * 0.012;

      // Pupil size (relative to canvas)
      const pupilRadius = Math.max(1, canvas.width * 0.012);

      ctx.save();

      for (const centerX of [leftCenterX, rightCenterX]) {
        const px = centerX + gazeSmoothedX * maxShiftX;
        const py = eyeY + gazeSmoothedY * maxShiftY;

        // Tiny dark pupil dot
        ctx.fillStyle = 'rgba(15, 5, 30, 0.85)';
        ctx.beginPath();
        ctx.arc(px, py, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        // Even tinier specular highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.beginPath();
        ctx.arc(
          px - pupilRadius * 0.3,
          py - pupilRadius * 0.3,
          pupilRadius * 0.35,
          0, Math.PI * 2
        );
        ctx.fill();
      }

      ctx.restore();
    }

    // ── Checkerboard Removal via Flood Fill + Erosion ──
    // Phase 1: Flood fill from edges through neutral pixels.
    // Phase 2: Erosion passes to clean JPEG-blended boundary pixels.
    function removeCheckerboard(srcCanvas) {
      const w = srcCanvas.width;
      const h = srcCanvas.height;
      const offCtx = srcCanvas.getContext('2d');
      const imageData = offCtx.getImageData(0, 0, w, h);
      const d = imageData.data;

      // Helper: is this pixel neutral enough for flood fill?
      function isNeutral(idx) {
        const r = d[idx], g = d[idx+1], b = d[idx+2];
        const spread = Math.abs(r - g) + Math.abs(g - b) + Math.abs(r - b);
        const avg = (r + g + b) / 3;
        return spread < 22 && avg > 110 && avg < 245;
      }

      // Helper: is this pixel "semi-neutral" (for erosion cleanup)?
      function isSemiNeutral(idx) {
        const r = d[idx], g = d[idx+1], b = d[idx+2];
        const spread = Math.abs(r - g) + Math.abs(g - b) + Math.abs(r - b);
        const avg = (r + g + b) / 3;
        return spread < 28 && avg > 105 && avg < 240;
      }

      // ── Phase 1: BFS Flood Fill from edges ──
      const visited = new Uint8Array(w * h);
      const queue = [];

      for (let x = 0; x < w; x++) {
        queue.push(x);
        queue.push((h - 1) * w + x);
      }
      for (let y = 0; y < h; y++) {
        queue.push(y * w);
        queue.push(y * w + (w - 1));
      }

      let head = 0;
      while (head < queue.length) {
        const pos = queue[head++];
        if (pos < 0 || pos >= w * h || visited[pos]) continue;
        visited[pos] = 1;

        const idx = pos * 4;
        if (!isNeutral(idx)) continue;

        d[idx + 3] = 0;

        const x = pos % w;
        const y = Math.floor(pos / w);
        if (x > 0)     queue.push(pos - 1);
        if (x < w - 1) queue.push(pos + 1);
        if (y > 0)     queue.push(pos - w);
        if (y < h - 1) queue.push(pos + w);
      }

      // ── Phase 2: Erosion passes ──
      // Any semi-neutral pixel touching a transparent pixel gets removed.
      // Run multiple passes to erode inward through JPEG boundary blur.
      for (let pass = 0; pass < 3; pass++) {
        const toErase = [];
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const pos = y * w + x;
            const idx = pos * 4;
            if (d[idx + 3] === 0) continue; // already transparent
            if (!isSemiNeutral(idx)) continue;

            // Check if any neighbor is transparent
            const neighbors = [];
            if (x > 0)     neighbors.push(((y) * w + (x-1)) * 4);
            if (x < w - 1) neighbors.push(((y) * w + (x+1)) * 4);
            if (y > 0)     neighbors.push(((y-1) * w + x) * 4);
            if (y < h - 1) neighbors.push(((y+1) * w + x) * 4);

            const touchesTransparent = neighbors.some(ni => d[ni + 3] === 0);
            if (touchesTransparent) {
              toErase.push(idx);
            }
          }
        }
        for (const idx of toErase) {
          d[idx + 3] = 0;
        }
      }

      // ── Phase 3: Seed trapped pockets ──
      // Only target the BRIGHT checkerboard squares in enclosed areas.
      // The subsequent erosion will expand from these to catch darker ones.
      for (let i = 0; i < d.length; i += 4) {
        if (d[i + 3] === 0) continue;
        const r = d[i], g = d[i+1], b = d[i+2];
        const spread = Math.abs(r - g) + Math.abs(g - b) + Math.abs(r - b);
        const avg = (r + g + b) / 3;
        if (spread < 10 && avg > 205 && avg < 245) {
          d[i + 3] = 0;
        }
      }

      // ── Phase 4: Targeted erosion around pockets ──
      // Expand transparency from Phase 3 holes into adjacent neutral pixels.
      for (let pass = 0; pass < 3; pass++) {
        const toErase = [];
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const idx = (y * w + x) * 4;
            if (d[idx + 3] === 0) continue;
            const r = d[idx], g = d[idx+1], b = d[idx+2];
            const spread = Math.abs(r - g) + Math.abs(g - b) + Math.abs(r - b);
            const avg = (r + g + b) / 3;
            // Only erode if pixel is clearly neutral (not colored art)
            if (spread >= 18 || avg <= 105 || avg >= 240) continue;

            let hasTransparentNeighbor = false;
            if (x > 0     && d[((y)*w+(x-1))*4+3] === 0) hasTransparentNeighbor = true;
            if (x < w - 1 && d[((y)*w+(x+1))*4+3] === 0) hasTransparentNeighbor = true;
            if (y > 0     && d[((y-1)*w+x)*4+3] === 0) hasTransparentNeighbor = true;
            if (y < h - 1 && d[((y+1)*w+x)*4+3] === 0) hasTransparentNeighbor = true;

            if (hasTransparentNeighbor) toErase.push(idx);
          }
        }
        for (const idx of toErase) d[idx + 3] = 0;
      }

      offCtx.putImageData(imageData, 0, 0);
      return srcCanvas;
    }

    function removeCheckerboardBySamples(srcCanvas) {
      const w = srcCanvas.width;
      const h = srcCanvas.height;
      const offCtx = srcCanvas.getContext('2d');
      const imageData = offCtx.getImageData(0, 0, w, h);
      const d = imageData.data;

      function samplePixel(x, y) {
        const idx = (y * w + x) * 4;
        return { r: d[idx], g: d[idx + 1], b: d[idx + 2], a: d[idx + 3] };
      }

      const backgroundSamples = [
        samplePixel(0, 0),
        samplePixel(w - 1, 0),
        samplePixel(0, h - 1),
        samplePixel(w - 1, h - 1),
        samplePixel(Math.floor(w / 2), 0),
        samplePixel(Math.floor(w / 2), h - 1),
        samplePixel(0, Math.floor(h / 2)),
        samplePixel(w - 1, Math.floor(h / 2))
      ].filter(sample => sample.a > 0);

      function isBackgroundColor(idx, tolerance = 28) {
        const r = d[idx], g = d[idx + 1], b = d[idx + 2], a = d[idx + 3];
        if (a === 0) return false;
        const spread = Math.abs(r - g) + Math.abs(g - b) + Math.abs(r - b);
        if (spread > 18) return false;
        return backgroundSamples.some(sample =>
          Math.abs(sample.r - r) + Math.abs(sample.g - g) + Math.abs(sample.b - b) <= tolerance
        );
      }

      function isKeyGreen(idx) {
        return d[idx] === 57 && d[idx + 1] === 255 && d[idx + 2] === 20;
      }

      const visited = new Uint8Array(w * h);
      const queue = [];

      for (let x = 0; x < w; x++) {
        queue.push(x);
        queue.push((h - 1) * w + x);
      }
      for (let y = 0; y < h; y++) {
        queue.push(y * w);
        queue.push(y * w + (w - 1));
      }

      for (let i = 0; i < d.length; i += 4) {
        if (isBackgroundColor(i, 24)) {
          d[i] = 57;
          d[i + 1] = 255;
          d[i + 2] = 20;
          d[i + 3] = 255;
        }
      }

      let head = 0;
      while (head < queue.length) {
        const pos = queue[head++];
        if (pos < 0 || pos >= w * h || visited[pos]) continue;
        visited[pos] = 1;

        const idx = pos * 4;
        if (!isKeyGreen(idx)) continue;

        d[idx + 3] = 0;

        const x = pos % w;
        const y = Math.floor(pos / w);
        if (x > 0) queue.push(pos - 1);
        if (x < w - 1) queue.push(pos + 1);
        if (y > 0) queue.push(pos - w);
        if (y < h - 1) queue.push(pos + w);
      }

      for (let pass = 0; pass < 2; pass++) {
        const toErase = [];
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const idx = (y * w + x) * 4;
            if (d[idx + 3] === 0) continue;
            if (!isBackgroundColor(idx, 34)) continue;

            const touchesTransparent =
              (x > 0 && d[((y) * w + (x - 1)) * 4 + 3] === 0) ||
              (x < w - 1 && d[((y) * w + (x + 1)) * 4 + 3] === 0) ||
              (y > 0 && d[((y - 1) * w + x) * 4 + 3] === 0) ||
              (y < h - 1 && d[((y + 1) * w + x) * 4 + 3] === 0);

            if (touchesTransparent) toErase.push(idx);
          }
        }
        for (const idx of toErase) d[idx + 3] = 0;
      }

      offCtx.putImageData(imageData, 0, 0);
      return srcCanvas;
    }

    // ── Extract & process a single frame from the grid ──
    function extractFrame(img, col, row) {
      const fc = document.createElement('canvas');
      fc.width = actualCellW;
      fc.height = actualCellH;
      const fCtx = fc.getContext('2d');

      const sx = col * actualCellW;
      const sy = row * actualCellH;

      fCtx.drawImage(img, sx, sy, actualCellW, actualCellH, 0, 0, actualCellW, actualCellH);
      return fc;
    }

    // ── Process the entire sheet into individual frames ──
    function processSheet(img) {
      const sw = img.naturalWidth;
      const sh = img.naturalHeight;
      const layout = animationManifest.layout || DEFAULT_MANIFEST.layout;
      const columns = layout.columns || DEFAULT_MANIFEST.layout.columns;
      const rows = layout.rows || DEFAULT_MANIFEST.layout.rows;

      actualCellW = Math.floor(sw / columns);
      actualCellH = Math.floor(sh / rows);

      console.log(`Sheet: ${sw}x${sh}, cell: ${actualCellW}x${actualCellH}`);

      processedFrames = {};
      for (const [frameIdx, [col, row]] of Object.entries(frameGrid)) {
        processedFrames[frameIdx] = extractFrame(img, col, row);
      }

      sheetReady = true;
      console.log(`Processed ${Object.keys(processedFrames).length} frames`);
    }

    function normalizeManifest(manifest) {
      const safeManifest = manifest || DEFAULT_MANIFEST;
      frameMap = safeManifest.states || DEFAULT_MANIFEST.states;
      frameGrid = Object.fromEntries(
        Object.entries(safeManifest.frames || DEFAULT_MANIFEST.frames)
          .map(([frameIdx, frameData]) => [frameIdx, frameData.grid])
      );
      animationManifest = {
        ...DEFAULT_MANIFEST,
        ...safeManifest,
        layout: {
          ...DEFAULT_MANIFEST.layout,
          ...(safeManifest.layout || {})
        }
      };
    }

    async function loadManifest() {
      const manifest = await wizard.getAnimationManifest();
      normalizeManifest(manifest);
    }

    async function initBuddy() {
      await loadManifest();

      spriteSheet.onload = async () => {
        processSheet(spriteSheet);
        const cfg = await wizard.getConfig();
        await applyScale(cfg.wizardScale);
        // Restore saved weather state
        if (cfg.weatherMode && cfg.weatherMode !== 'none') {
          setWeather(cfg.weatherMode, cfg.weatherIntensity);
        }
        startCursorTracking();
        requestAnimationFrame(animate);
      };

      spriteSheet.onerror = async () => {
        console.warn('Sprite sheet not found, using placeholder');
        const cfg = await wizard.getConfig();
        await applyScale(cfg.wizardScale);
        requestAnimationFrame(animate);
      };

      spriteSheet.src = `../assets/${animationManifest.spriteSheet || DEFAULT_MANIFEST.spriteSheet}`;
    }

    function drawPlaceholder() {
      ctx.fillStyle = '#1a0a30';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#a855f7';
      ctx.font = '60px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🧙', canvas.width / 2, canvas.height / 2);
    }

    function animate(timestamp) {
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      const stateConfig = frameMap[currentState] || frameMap.idle || DEFAULT_MANIFEST.states.idle;
      const fps = stateConfig.fps || 1;

      updateMicroMotion(timestamp, Math.max(0, dt || 0));
      updateGaze(Math.max(0, dt || 0));

      animTick += dt;

      if (animTick >= 1 / fps) {
        animTick = 0;
        frameIndex = (frameIndex + 1) % stateConfig.frames.length;
      }

      // Clear and draw
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (sheetReady) {
        const srcFrameIdx = stateConfig.frames[frameIndex];
        const frameCanvas = processedFrames[srcFrameIdx];

        if (frameCanvas) {
          ctx.save();
          // Subtle body lean toward cursor (max ~1.5px shift, 0.5° tilt)
          const leanX = gazeSmoothedX * canvas.width * 0.008;
          const leanTilt = gazeSmoothedX * 0.009;
          ctx.translate(
            canvas.width / 2 + driftOffsetX + leanX,
            canvas.height / 2 + breathOffset + hoverOffsetY
          );
          ctx.rotate(tiltRadians + leanTilt);
          ctx.scale(squashX, squashY);
          // Draw the frame, fitting into our display canvas
          ctx.drawImage(frameCanvas, -canvas.width / 2, -canvas.height / 2, canvas.width, canvas.height);
          // Draw overlays in the same transform space so they follow lean/breathe
          ctx.translate(-canvas.width / 2, -canvas.height / 2);
          ctx.scale(1 / squashX, 1 / squashY);
          drawBlinkOverlay();
          drawGazePupils();
          ctx.restore();
        } else {
          drawPlaceholder();
        }
      } else {
        drawPlaceholder();
      }

      // Z bubbles for sleeping
      if (currentState === 'sleeping') {
        zBubbleTimer += dt;
        if (zBubbleTimer > 2) {
          zBubbleTimer = 0;
          spawnZBubble();
        }
      }

      // ── Weather overlay ──
      const safeDt = Math.max(0, Math.min(dt || 0, 0.1));
      updateWeather(safeDt);
      drawWeather();

      requestAnimationFrame(animate);
    }

    function spawnZBubble() {
      const z = document.createElement('div');
      z.className = 'z-bubble';
      z.textContent = 'Z';
      z.style.right = `${30 + Math.random() * 20}px`;
      z.style.top = `${20 + Math.random() * 15}px`;
      z.style.fontSize = `${16 + Math.random() * 10}px`;
      document.getElementById('wizard-container').appendChild(z);
      setTimeout(() => z.remove(), 2000);
    }

    function setState(newState) {
      if (newState === currentState) return;
      currentState = newState;
      frameIndex = 0;
      animTick = 0;

      // Update glow ring
      glowRing.className = '';
      if (newState === 'researching') glowRing.classList.add('researching');
      if (newState === 'sleeping') glowRing.classList.add('sleeping');

      // Update state label
      const labels = {
        idle: 'idle',
        talking: 'speaking',
        reading: 'reading',
        sleeping: 'asleep',
        laughing: 'amused',
        sad: 'somber',
        researching: 'researching'
      };
      stateLabel.textContent = labels[newState] || newState;
    }

    function showSpeechBubble(text, duration) {
      speechBubble.textContent = text;
      speechBubble.classList.add('visible');
      setTimeout(() => speechBubble.classList.remove('visible'), duration || 3000);
    }

    // ── IPC Listeners ──
    wizard.onWizardState((state) => {
      setState(state);

      const bubbleMessages = {
        researching: '📚 Consulting the vast libraries...',
        talking: '💬 Ah, let me share my wisdom...',
        laughing: '😄 Ha ha! Most amusing!',
        sad: '😔 The stars weep...',
        sleeping: '💤 Zzz...',
        reading: '📖 Fascinating text...'
      };

      if (bubbleMessages[state]) {
        showSpeechBubble(bubbleMessages[state], state === 'sleeping' ? 5000 : 3000);
      }
    });

    wizard.onIdleUpdate(({ state, idleTime, shortThreshold, longThreshold }) => {
      // Only change state if not currently in an active state
      if (['talking', 'researching', 'laughing', 'sad'].includes(currentState)) return;

      if (idleTime >= longThreshold) {
        setState('sleeping');
      } else if (idleTime >= shortThreshold) {
        setState('reading');
      } else if (currentState === 'sleeping' || currentState === 'reading') {
        setState('idle');
        showSpeechBubble('✨ Back to the Arcane Ledge!', 2000);
      }
    });

    // ── Custom Drag + Double-Click System ──
    // We can't use -webkit-app-region: drag because it eats all mouse events.
    // Instead we handle dragging manually and detect double-clicks ourselves.
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let hasMoved = false;
    let lastClickTime = 0;
    const DOUBLE_CLICK_MS = 400;
    const DRAG_THRESHOLD = 5;  // px before we consider it a drag, not a click

    canvas.addEventListener('mousedown', (e) => {
      if (e.button === 0) { // left button
        isDragging = true;
        hasMoved = false;
        dragStartX = e.screenX;
        dragStartY = e.screenY;
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.screenX - dragStartX;
      const dy = e.screenY - dragStartY;
      if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) {
        hasMoved = true;
        wizard.moveBuddy(dx, dy);
        dragStartX = e.screenX;
        dragStartY = e.screenY;
      }
    });

    document.addEventListener('mouseup', (e) => {
      if (!isDragging) return;
      isDragging = false;

      // If we didn't drag, treat it as a click → check for double click
      if (!hasMoved && e.button === 0) {
        const now = Date.now();
        if (now - lastClickTime < DOUBLE_CLICK_MS) {
          // Double-click detected!
          wizard.openChat();
          lastClickTime = 0;
        } else {
          lastClickTime = now;
        }
      }
    });

    // Right-click opens settings
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      wizard.openSettings();
    });

    // Listen for config updates (scale change from settings)
    wizard.onConfigUpdate(async (cfg) => {
      if (cfg.wizardScale && cfg.wizardScale !== wizardScale) {
        await applyScale(cfg.wizardScale);
      }
      // Apply weather config if present
      if (cfg.weatherMode !== undefined) {
        setWeather(cfg.weatherMode, cfg.weatherIntensity);
      }
    });

    // Listen for weather commands from main
    if (wizard.onWeatherChange) {
      wizard.onWeatherChange((data) => {
        setWeather(data.mode, data.intensity);
      });
    }

    // Initial greeting
    setTimeout(() => {
      showSpeechBubble('🧙 Greetings! Double-click to chat!', 4000);
    }, 1500);

    initBuddy();
  </script>
</body>
